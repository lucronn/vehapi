  <script>
    // Theme init — prevent FOUC
    (function () {
      var t = localStorage.getItem('torque-theme');
      if (!t) t = 'dark';
      document.documentElement.setAttribute('data-theme', t);
      if (t === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
      } else {
        document.documentElement.classList.add('light');
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

<body class="antialiased bg-[#0a0a0f] text-white min-h-screen" style="background-color: #0a0a0f;">
  <!-- Eruda: opt-in via ?eruda or #/path?eruda (dev only; not loaded by default) -->
  <script>
    (function () {
      function hasEruda() {
        if (new URLSearchParams(window.location.search).has('eruda')) return true;
        var h = window.location.hash || '';
        var q = h.indexOf('?');
        if (q === -1) return false;
        return new URLSearchParams(h.slice(q)).has('eruda');
      }
      if (hasEruda()) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
        s.onload = function () { eruda.init(); };
        document.body.appendChild(s);
      }
    })();
  </script>
  <app-root></app-root>
</body>
