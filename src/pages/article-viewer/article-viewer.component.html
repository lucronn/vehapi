<div class="min-h-screen p-4 sm:p-6 lg:p-8 text-slate-200">
  <div class="app-container max-w-4xl">
    <div class="flex justify-between items-center mb-6">
      <a [routerLink]="['/vehicle', contentSource(), vehicleId()]"
        class="text-cyan-200 hover:text-cyan-100 inline-flex items-center gap-2 font-medium">
        <span aria-hidden="true">←</span> Back to Dashboard
      </a>

      <!-- AI Toggle -->
      <div class="flex items-center space-x-2" *ngIf="geminiApi.aiEnabled()">
        <div class="flex flex-col items-end mr-2" *ngIf="isRewriting()">
          <span class="text-xs text-cyan-400 animate-pulse">Enhancing...</span>
        </div>
        <span class="text-sm font-medium" [class.text-gray-400]="!showOriginal() && !isRewriting()"
          [class.text-cyan-400]="isRewriting()">
          {{ isRewriting() ? 'AI-Working' : 'AI-Rewritten' }}
        </span>
        <label for="toggle" class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="toggle" class="sr-only peer" [checked]="showOriginal()"
            (change)="showOriginal.set(!showOriginal())">
          <div
            class="w-11 h-6 bg-gray-600 rounded-full peer peer-focus:ring-4 peer-focus:ring-cyan-800 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-cyan-600">
          </div>
        </label>
        <span class="text-sm font-medium" [class.text-gray-400]="showOriginal()">Original</span>
      </div>
    </div>

    <div class="app-surface p-6 sm:p-8 lg:p-10">
      @if (articleData()) {
      <div class="motor-content" [innerHTML]="displayContent()"></div>
      } @else {
      <!-- Loading Skeleton -->
      <div class="space-y-4 animate-pulse">
        <div class="text-center text-cyan-200 mb-4">
          {{ isRewriting() ? 'Gemini is rewriting this article to be easier to read...' : 'Loading article...' }}
        </div>
        <div class="h-8 bg-slate-800/80 rounded w-3/4"></div>
        <div class="h-4 bg-slate-800/80 rounded w-full"></div>
        <div class="h-4 bg-slate-800/80 rounded w-5/6"></div>
        <div class="h-4 bg-slate-800/80 rounded w-full"></div>
        <div class="h-8 bg-slate-800/80 rounded w-1/2 mt-8"></div>
        <div class="h-4 bg-slate-800/80 rounded w-full"></div>
        <div class="h-4 bg-slate-800/80 rounded w-full"></div>
      </div>
      }
    </div>
  </div>
</div>
