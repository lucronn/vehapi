<div class="procedure-stepper">
  <div class="stepper-header">
    <h3 class="stepper-title">{{ title }}</h3>
    <div class="stepper-progress">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="progress()"></div>
      </div>
      <span class="progress-text">Step {{ currentStep() + 1 }} of {{ totalSteps() }}</span>
    </div>
  </div>

  <div class="stepper-content">
    @if (currentStepData(); as step) {
      <div class="step-card">
        <div class="step-number">{{ step.number }}</div>
        <div class="step-content" [innerHTML]="step.content"></div>
        <div class="step-actions">
          <label class="step-checkbox">
            <input type="checkbox" [checked]="step.completed" (change)="toggleStepComplete(currentStep())">
            <span>Mark as complete</span>
          </label>
        </div>
      </div>
    }
  </div>

  <div class="stepper-navigation">
    <button 
      class="nav-button nav-button-prev" 
      [disabled]="!canGoPrevious()"
      (click)="previousStep()">
      ← Previous
    </button>
    
    <div class="step-indicators">
      @for (step of steps; track step.number; let i = $index) {
        <button
          class="step-indicator"
          [class.active]="i === currentStep()"
          [class.completed]="step.completed"
          (click)="goToStep(i)"
          [attr.aria-label]="'Go to step ' + step.number">
          {{ step.number }}
        </button>
      }
    </div>
    
    <button 
      class="nav-button nav-button-next" 
      [disabled]="!canGoNext()"
      (click)="nextStep()">
      Next →
    </button>
  </div>
</div>
