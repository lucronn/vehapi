<aside class="w-64 bg-torque-dark border-r border-white/5 flex flex-col h-full overflow-hidden flex-shrink-0">
    <!-- Header -->
    <div class="h-14 border-b border-white/5 flex flex-col justify-center px-4 shrink-0 bg-torque-dark">
        <div class="flex items-center justify-between gap-2">
            <h2 class="text-sm font-bold text-white truncate min-w-0">{{ vehicleName }}</h2>
            <a routerLink="/" class="btn-glass p-1.5 rounded-lg flex-shrink-0" title="Home" aria-label="Home">
                <lucide-icon [img]="icons.House" class="w-4 h-4"></lucide-icon>
            </a>
        </div>
        <p class="text-[10px] text-torque-muted uppercase tracking-wider">Dashboard</p>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto p-3 space-y-1">
        <button (click)="onSectionClick('overview')"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-left transition-all duration-200 border-l-2"
            [ngClass]="{
                'border-torque-cyan bg-gradient-to-r from-torque-cyan/10 to-transparent text-white': activeSection === 'overview',
                'border-transparent text-torque-muted hover:text-white hover:bg-white/[0.03]': activeSection !== 'overview'
            }">
            <lucide-icon [img]="icons.House" class="w-4 h-4"></lucide-icon>
            <span class="text-xs font-bold tracking-[0.15em] uppercase">Overview</span>
        </button>

        <button (click)="onSectionClick('common-issues')"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-left transition-all duration-200 border-l-2 mt-1"
            [ngClass]="{
                'border-torque-cyan bg-gradient-to-r from-torque-cyan/10 to-transparent text-white': activeSection === 'common-issues',
                'border-transparent text-torque-muted hover:text-white hover:bg-white/[0.03]': activeSection !== 'common-issues'
            }">
            <lucide-icon [img]="icons.Lightbulb" class="w-4 h-4"></lucide-icon>
            <span class="text-xs font-bold tracking-[0.15em] uppercase">Common Issues</span>
        </button>

        <div class="pt-4 pb-2 px-3">
            <p class="text-[10px] font-mono uppercase tracking-[0.2em] text-torque-muted mb-1">Categories</p>
        </div>

        <app-category-tree (articleSelected)="onArticleFromTree($event)"></app-category-tree>

    </nav>

    <!-- Footer -->
    <div class="p-4 border-t border-white/5 space-y-3 shrink-0">

        <!-- Account link -->
        <a routerLink="/credits"
            class="w-full flex items-center gap-2 px-3 py-2 rounded-xl
           text-[hsl(215,20%,65%)] hover:text-white hover:bg-white/[0.03] transition-colors text-xs font-semibold border border-transparent hover:border-white/5">
            <lucide-icon [img]="icons.CreditCard" class="w-4 h-4 text-torque-cyan"></lucide-icon>
            Account
        </a>

        <!-- Auth Section -->
        @if (authService.isLoggedIn()) {
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-[hsl(217,91%,55%)] flex items-center justify-center flex-shrink-0">
                <lucide-icon [img]="icons.User" class="w-3.5 h-3.5 text-white"></lucide-icon>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-[10px] font-semibold text-white truncate">{{ authService.user()?.email }}</p>
                <p class="text-[9px] font-mono text-torque-muted">Signed In</p>
            </div>
            <button (click)="signOut()" title="Sign Out" aria-label="Sign out"
                class="p-1.5 rounded-lg text-torque-muted hover:text-red-400 hover:bg-red-400/10 transition-colors focus-visible:ring-2 focus-visible:ring-torque-cyan/50 focus-visible:ring-offset-2 focus-visible:ring-offset-[hsl(230,35%,9%)]">
                <lucide-icon [img]="icons.LogOut" class="w-3.5 h-3.5"></lucide-icon>
            </button>
        </div>
        } @else {
        <button (click)="onOpenAuthClick()" class="w-full flex items-center gap-2 px-3 py-2 rounded-xl
                       bg-[hsl(217,91%,55%)]/10 border border-[hsl(217,91%,55%)]/20
                       text-[hsl(217,91%,70%)] hover:bg-[hsl(217,91%,55%)]/20
                       transition-colors text-xs font-semibold">
            <lucide-icon [img]="icons.LogIn" class="w-4 h-4"></lucide-icon>
            Sign In / Create Account
        </button>
        }

    </div>
</aside>
