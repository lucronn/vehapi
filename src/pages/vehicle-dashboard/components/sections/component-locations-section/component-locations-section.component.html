<div class="animate-fade-in">
    @if (isLoading()) {
    <app-loading-skeleton class="block h-64"></app-loading-skeleton>
    } @else {
    @if (locations().length === 0) {
    <app-empty-state icon="package" message="No Component Locations"
        submessage="Component location data is not available for this vehicle.">
    </app-empty-state>
    } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        @for (item of locations(); track trackById($index, item)) {
        <a [routerLink]="['/vehicle', contentSource, vehicleId, 'article', item.id]"
            class="card block overflow-hidden transition-all group">

            <!-- Thumbnail -->
            <div class="aspect-video relative overflow-hidden flex items-center justify-center"
                style="background:var(--bg-muted)">
                @if (item.thumbnailHref) {
                <img [src]="getThumbnailUrl(item.thumbnailHref)" alt="Location diagram"
                    class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity">
                } @else {
                <lucide-icon [img]="icons.Image" class="w-10 h-10" style="color:var(--text-muted)"></lucide-icon>
                }
            </div>

            <div class="p-4">
                <h3 class="font-semibold text-sm line-clamp-2" style="color:var(--text-primary)">{{ item.title }}</h3>
                <div class="mt-2 text-xs flex items-center" style="color:var(--text-muted)">
                    <lucide-icon [img]="icons.MapPin" class="w-3.5 h-3.5 mr-1"></lucide-icon>
                    {{ item.bucket }}
                </div>
            </div>
        </a>
        }
    </div>
    }
    }
</div>
