<div class="animate-fade-in space-y-8">

    <!-- High-Tech Interval Selector -->
    <div class="glass-card p-1">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 px-8 py-6">
            <div class="flex items-center gap-4">
                <div
                    class="w-12 h-12 rounded-2xl bg-[hsl(var(--accent-cyan)/0.1)] flex items-center justify-center text-[hsl(var(--accent-cyan))]">
                    <lucide-icon [img]="icons.Gauge" class="w-6 h-6"></lucide-icon>
                </div>
                <div>
                    <p class="text-[9px] uppercase tracking-[0.3em] font-black text-[hsl(var(--text-muted))]">System
                        Threshold</p>
                    <h3 class="text-lg font-bold text-white tracking-tight">Mileage Vector</h3>
                </div>
            </div>

            <div class="flex items-center gap-4 self-end md:self-auto">
                <div class="h-px w-8 bg-white/10 hidden md:block"></div>
                <select [value]="selectedInterval()" (change)="onIntervalChange($event)"
                    class="bg-white/5 border border-white/5 text-white text-sm rounded-xl focus:ring-0 focus:border-[hsl(var(--accent-cyan))] block p-3 pr-10 font-black uppercase tracking-widest cursor-pointer outline-none transition-all hover:bg-white/10">
                    @for (interval of availableIntervals; track interval) {
                    <option [value]="interval" class="bg-[hsl(var(--bg-deep))]">{{ interval | number }} MI</option>
                    }
                </select>
            </div>
        </div>
    </div>

    @if (isLoading()) {
    <app-loading-skeleton type="card" [count]="1"></app-loading-skeleton>
    } @else {
    @if (schedules().length === 0) {
    <app-empty-state icon="package" message="No Maintenance Scheduled"
        submessage="No critical service events detected for this interval.">
    </app-empty-state>
    } @else {
    <div class="glass-card overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead class="bg-white/[0.02] border-b border-white/5">
                    <tr>
                        <th scope="col"
                            class="px-8 py-6 text-[10px] uppercase tracking-[0.3em] font-black text-[hsl(var(--text-muted))]">
                            Logic</th>
                        <th scope="col"
                            class="px-8 py-6 text-[10px] uppercase tracking-[0.3em] font-black text-[hsl(var(--text-muted))]">
                            Operation</th>
                        <th scope="col"
                            class="px-8 py-6 text-[10px] uppercase tracking-[0.3em] font-black text-[hsl(var(--text-muted))] text-right">
                            Cycle</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    @for (item of schedules(); track $index) {
                    <tr class="hover:bg-white/[0.01] transition-colors group animate-fade-in-up"
                        [style.animation-delay]="$index * 50 + 'ms'">
                        <td class="px-8 py-6">
                            <span
                                class="inline-flex items-center px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest bg-[hsl(var(--accent-cyan)/0.1)] text-[hsl(var(--accent-cyan))] border border-[hsl(var(--accent-cyan)/0.2)]">
                                {{ item.action }}
                            </span>
                        </td>
                        <td class="px-8 py-6">
                            <p
                                class="text-white font-bold tracking-tight group-hover:text-[hsl(var(--accent-cyan))] transition-colors">
                                {{ item.description }}</p>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <span
                                class="text-[10px] font-black text-[hsl(var(--text-muted))] uppercase tracking-widest">{{
                                item.frequency || 'AS NEEDED' }}</span>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
    }
    }
</div>
