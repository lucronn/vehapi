<div class="animate-fade-in space-y-6">

    <!-- Interval Selector -->
    <div class="card p-5">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg flex items-center justify-center"
                    style="background:rgba(0,212,255,0.1);color:hsl(191,97%,50%)">
                    <lucide-icon [img]="icons.Gauge" class="w-4 h-4"></lucide-icon>
                </div>
                <div>
                    <p class="text-[10px] font-mono uppercase tracking-[0.15em]" style="color:hsl(191,97%,50%)">Service
                        Interval</p>
                    <h3 class="text-base font-bold" style="color:var(--text-primary)">Select Mileage</h3>
                </div>
            </div>

            <select [value]="selectedInterval()" (change)="onIntervalChange($event)"
                class="text-sm rounded-lg p-2.5 pr-8 font-semibold cursor-pointer outline-none transition-all"
                style="background:var(--bg-muted);border:1px solid var(--border);color:var(--text-primary)">
                @for (interval of availableIntervals; track interval) {
                <option [value]="interval">{{ interval | number }} mi</option>
                }
            </select>
        </div>
    </div>

    @if (isLoading()) {
    <app-loading-skeleton type="card" [count]="1"></app-loading-skeleton>
    } @else {
    @if (schedules().length === 0) {
    <app-empty-state icon="package" message="No Service Items"
        submessage="No maintenance items found for this mileage interval.">
    </app-empty-state>
    } @else {
    <div class="card overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead style="border-bottom:1px solid var(--border);background:var(--bg-muted)">
                    <tr>
                        <th scope="col" class="px-5 py-4 text-xs font-semibold uppercase tracking-wide"
                            style="color:var(--text-muted)">Action</th>
                        <th scope="col" class="px-5 py-4 text-xs font-semibold uppercase tracking-wide"
                            style="color:var(--text-muted)">Description</th>
                        <th scope="col" class="px-5 py-4 text-xs font-semibold uppercase tracking-wide text-right"
                            style="color:var(--text-muted)">Frequency</th>
                    </tr>
                </thead>
                <tbody>
                    @for (item of schedules(); track $index) {
                    <tr class="transition-colors animate-fade-in-up" style="border-bottom:1px solid var(--border-muted)"
                        [style.animation-delay]="$index * 50 + 'ms'">
                        <td class="px-5 py-4">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-semibold"
                                style="background:var(--primary-subtle);color:var(--primary)">
                                {{ item.action }}
                            </span>
                        </td>
                        <td class="px-5 py-4">
                            <p class="font-medium" style="color:var(--text-primary)">{{ item.description }}</p>
                        </td>
                        <td class="px-5 py-4 text-right">
                            <span class="text-xs font-medium" style="color:var(--text-muted)">{{
                                item.frequency || 'As needed' }}</span>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
    }
    }
</div>
