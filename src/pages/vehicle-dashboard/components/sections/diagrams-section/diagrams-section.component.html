<div class="space-y-4">
    @if (isLoading()) {
    <app-loading-skeleton type="grid" [count]="6"></app-loading-skeleton>
    }
    @else if (diagrams().length === 0) {
    <app-empty-state message="No diagrams found"
        submessage="Wiring diagrams and component locations may not be available" icon="package">
    </app-empty-state>
    }
    @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        @for (diagram of diagrams(); track trackById($index, diagram)) {
        <a [routerLink]="['/vehicle', contentSource, vehicleId, 'article', diagram.id]"
            class="block bg-gray-900 border border-cyan-500/30 hover:border-cyan-500/50 rounded-lg p-4 transition-all hover:shadow-lg hover:shadow-cyan-500/10 group">
            <div class="flex flex-col h-full">
                <div class="flex items-start gap-3 mb-3">
                    <div class="flex-shrink-0">
                        <lucide-icon [img]="icons.Cable"
                            class="w-5 h-5 text-purple-500 group-hover:text-purple-400 transition-colors">
                        </lucide-icon>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3
                            class="font-semibold text-white group-hover:text-cyan-400 transition-colors text-sm line-clamp-2">
                            {{ diagram.title || diagram.name || 'Diagram' }}
                        </h3>
                    </div>
                </div>
                @if (isWiringDiagram(diagram) && diagram.diagramType) {
                <span class="inline-block text-xs px-2 py-0.5 bg-black border border-cyan-500/20 rounded text-gray-400 self-start">
                    {{ diagram.diagramType }}
                </span>
                }
            </div>
        </a>
        }
    </div>
    }
</div>
