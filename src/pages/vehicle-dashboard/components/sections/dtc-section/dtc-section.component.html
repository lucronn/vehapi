<div class="space-y-4">
    @if (isLoading()) {
    <app-loading-skeleton type="grid" [count]="6"></app-loading-skeleton>
    }
    @else if (dtcs().length === 0) {
    <app-empty-state icon="info" message="No Fault Codes"
        submessage="No diagnostic trouble codes are available for this vehicle.">
    </app-empty-state>
    }
    @else {
    @for (dtc of dtcs(); track trackByCode($index, dtc)) {
    <div (click)="viewDtc(dtc)"
        class="card p-5 flex flex-col transition-all group animate-fade-in-up cursor-pointer hover:bg-white/5"
        [style.animation-delay]="$index * 50 + 'ms'">
        <div class="space-y-3">
            <div class="flex items-center justify-between">
                <span class="text-lg font-bold" style="color:var(--status-warning)">{{ dtc.code }}</span>
                <lucide-icon [img]="icons.TriangleAlert"
                    class="w-5 h-5 opacity-40 group-hover:opacity-80 transition-opacity"
                    style="color:var(--status-warning)"></lucide-icon>
            </div>
            <p class="text-sm font-medium leading-snug line-clamp-2" style="color:var(--text-primary)">{{
                dtc.description }}</p>
            <div class="flex items-center gap-2 text-xs" style="color:var(--text-muted)">
                <span>View Details</span>
                <lucide-icon [img]="icons.ArrowRight"
                    class="w-3 h-3 group-hover:translate-x-0.5 transition-transform"></lucide-icon>
            </div>
        </div>
    </div>
    }
    }
</div>
