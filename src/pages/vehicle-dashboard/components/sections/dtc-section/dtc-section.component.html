<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @if (isLoading()) {
    <app-loading-skeleton type="grid" [count]="6"></app-loading-skeleton>
    }
    @else if (dtcs().length === 0) {
    <app-empty-state icon="alert" message="No Fault Codes Found"
        submessage="No diagnostic trouble codes detected in this unit.">
    </app-empty-state>
    }
    @else {
    @for (dtc of dtcs(); track trackByCode($index, dtc)) {
    <a [routerLink]="['/vehicle', contentSource, vehicleId, 'article', dtc.id]"
        class="glass-card p-6 block hover:shadow-[0_0_30px_rgba(245,158,11,0.1)] hover:border-amber-500/30 transition-all duration-300 group relative overflow-hidden animate-fade-in-up"
        [style.animation-delay]="$index * 50 + 'ms'">

        <!-- Code Status Indicator -->
        <div class="absolute top-0 right-0 w-16 h-16 -mr-8 -mt-8 bg-amber-500/10 blur-[20px] rounded-full"></div>

        <div class="space-y-4 relative z-10">
            <div class="flex items-center justify-between">
                <span class="text-2xl font-black text-amber-500 tracking-tighter">{{ dtc.code }}</span>
                <lucide-icon [img]="icons.TriangleAlert"
                    class="w-5 h-5 text-amber-500/50 group-hover:text-amber-500 transition-colors"></lucide-icon>
            </div>

            <p
                class="text-sm text-white/60 group-hover:text-white/90 line-clamp-3 transition-colors leading-relaxed mt-2">
                {{ dtc.description || 'System fault detected with no additional description provided.' }}
            </p>

            <div
                class="pt-4 flex items-center gap-2 text-[10px] uppercase tracking-widest text-[hsl(var(--accent-cyan))] font-bold">
                View Resolution Guide
                <lucide-icon [img]="icons.TriangleAlert"
                    class="w-3 h-3 group-hover:translate-x-1 transition-transform"></lucide-icon>
            </div>
        </div>
    </a>
    }
    }
</div>
