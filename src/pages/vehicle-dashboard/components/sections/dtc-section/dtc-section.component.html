<div class="space-y-4">
    @if (isLoading()) {
    <app-loading-skeleton type="list" [count]="5"></app-loading-skeleton>
    }
    @else if (dtcs().length === 0) {
    <app-empty-state message="No diagnostic codes found" submessage="This is good news - no trouble codes are stored"
        icon="info">
    </app-empty-state>
    }
    @else {
    @for (dtc of dtcs(); track trackByCode($index, dtc)) {
    <a [routerLink]="['/vehicle', contentSource, vehicleId, 'article', dtc.id]"
        class="block bg-gray-800/50 border border-gray-700 hover:border-cyan-500 rounded-lg p-4 transition-all hover:shadow-lg hover:shadow-cyan-500/10 group">
        <div class="flex items-start gap-3">
            <div class="flex-shrink-0 mt-1">
                <lucide-icon [img]="icons.TriangleAlert"
                    class="w-5 h-5 text-amber-500 group-hover:text-amber-400 transition-colors">
                </lucide-icon>
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    <span class="font-mono font-bold text-cyan-400 group-hover:text-cyan-300 transition-colors">
                        {{ dtc.code }}
                    </span>
                    @if (dtc.system) {
                    <span class="text-xs px-2 py-0.5 bg-gray-700 rounded text-gray-400">
                        {{ dtc.system }}
                    </span>
                    }
                </div>
                <p class="text-gray-300 text-sm leading-relaxed">
                    {{ dtc.description || 'No description available' }}
                </p>
            </div>
        </div>
    </a>
    }
    }
</div>
