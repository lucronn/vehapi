<div class="space-y-4">
    @if (isLoading()) {
    <app-loading-skeleton type="card" [count]="6"></app-loading-skeleton>
    }
    @else if (procedures().length === 0) {
    <app-empty-state message="No procedures found" submessage="Repair procedures may not be available for this vehicle"
        icon="package">
    </app-empty-state>
    }
    @else {
    @for (procedure of procedures(); track trackById($index, procedure)) {
    <a [routerLink]="['/vehicle', contentSource, vehicleId, 'article', procedure.id]"
        class="block bg-gray-800/50 border border-gray-700 hover:border-cyan-500 rounded-lg p-4 transition-all hover:shadow-lg hover:shadow-cyan-500/10 group">
        <div class="flex items-start gap-3">
            <div class="flex-shrink-0 mt-1">
                <lucide-icon [img]="icons.Wrench"
                    class="w-5 h-5 text-green-500 group-hover:text-green-400 transition-colors">
                </lucide-icon>
            </div>
            <div class="flex-1 min-w-0">
                <h3 class="font-semibold text-white group-hover:text-cyan-400 transition-colors line-clamp-2">
                    {{ procedure.title || procedure.name || 'Repair Procedure' }}
                </h3>
                @if (procedure.category) {
                <span class="inline-block mt-1 text-xs px-2 py-0.5 bg-gray-700 rounded text-gray-400">
                    {{ procedure.category }}
                </span>
                }
            </div>
        </div>
    </a>
    }
    }
</div>
