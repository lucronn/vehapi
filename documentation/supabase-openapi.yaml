  /rpc/match_content_chunks:
    post:
      tags: [RPC]
      summary: Vector similarity search over chunks (scoped by vehicle)
      description: |
        Defined in `documentation/migrations/20260321_match_content_chunks_rpc.sql`.
        **Execute privilege** may be restricted to `service_role` — confirm in your database.

        Request body must match PostgREST RPC conventions (named arguments).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query_embedding
                - vehicle_external_id_filter
              properties:
                query_embedding:
                  description: 1024-dimensional vector (JSON array of numbers)
                  type: array
                  items: { type: number }
                  minItems: 1024
                  maxItems: 1024
                vehicle_external_id_filter:
                  type: string
                match_count:
                  type: integer
                  default: 8
                  maximum: 24
      responses:
        "200":
          description: Ranked chunks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchContentChunksResult"
        "403":
          description: Forbidden if role cannot execute
