name: Deploy Backend (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - 'vehapiproxi/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: vehapi-torque
  REGION: us-central1
  SERVICE: motorapiauthproxy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud functions deploy ${{ env.SERVICE }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --gen2 \
            --runtime=nodejs22 \
            --source=vehapiproxi \
            --entry-point=app \
            --trigger-http \
            --allow-unauthenticated \
            --memory=512Mi \
            --timeout=120s \
            --min-instances=0 \
            --max-instances=20 \
            --set-env-vars="NODE_ENV=production,GOOGLE_CLOUD_RUN=1,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}"
