DEMO_MODE: "true"
GCLOUD_PROJECT: "vehapi-torque"
LOG_EXECUTION_ID: "true"
MOTOR_API_BASE: "https://sites.motor.com/m1"
NODE_ENV: "production"
PROXY_PORT: "3001"
GOOGLE_CLOUD_PROJECT: "vehapi-torque"

# Gemini models — Gemini 2.5 Flash Lite for all AI (structured + free-text)
VERTEX_PARSE_MODEL: "gemini-2.5-flash-lite"
VERTEX_TEXT_MODEL: "gemini-2.5-flash-lite"

# L2 RAG — Vertex AI text-embedding-004 (768-dim)
ENABLE_L2_EMBEDDINGS: "true"
EMBEDDING_MODEL: "text-embedding-004"
L2_EMBEDDING_DIMS: "768"

# Parse concurrency — Gemini 2.5 supports higher throughput
NEMOTRON_STRUCTURED_CONCURRENCY: "10"

# Cloud Vision API — OCR for PDFs and images (separate GCP account key)
# CLOUD_VISION_API_KEY: set-via-secret-manager

# Document AI — uncomment and set processor ID once created in console
# ENABLE_DOCUMENT_AI: "true"
# DOCUMENT_AI_PROCESSOR: "your-processor-id-here"
# DOCUMENT_AI_LOCATION: "us"

# Vertex AI RAG Engine — uncomment once corpus is created
# VERTEX_RAG_CORPUS: "your-corpus-id-here"

# Cloud SQL — set via Secret Manager or Cloud Run env vars (not in this file for security)
# CLOUD_SQL_CONNECTION_NAME: "vehapi-torque:us-central1:vehapi"
# DB_NAME: "vehapi"
# DB_USER: "vehapi"
# DB_PASSWORD: set-via-secret-manager
